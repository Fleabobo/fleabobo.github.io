<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact | Alex Morgan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="site-header">
      <nav class="nav container">
        <a class="brand" href="index.html">Alex Morgan</a>
        <div class="nav-links">
          <a href="index.html">About</a>
          <a href="projects.html">Projects</a>
          <a class="active" href="contact.html">Contact</a>
        </div>
      </nav>
    </header>

    <main class="container page">
      <section class="contact-layout">
        <article class="contact-card">
          <p class="eyebrow">Let’s connect</p>
          <h1>Ready to build something memorable?</h1>
          <p>
            Whether you need a launch page, a polished website, or a fresh visual direction,
            I’d love to hear about your next idea.
          </p>
          <p>Email: hello@alexmorgan.dev</p>
          <p>Location: London, UK</p>
        </article>

        <article class="contact-card">
          <form>
            <input type="text" placeholder="Your name" />
            <input type="email" placeholder="Your email" />
            <textarea placeholder="Tell me about your project"></textarea>
            <a class="button primary" href="mailto:hello@alexmorgan.dev">Send Message</a>
          </form>
        </article>
      </section>
    </main>
  </body>
</html>
